<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Покупка/продажа — Барахолка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            color: #0f172a;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 1.5rem 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .back-home {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(4px);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .back-home:hover {
            background: rgba(0,0,0,0.1);
            transform: scale(0.97);
        }

        .search-section {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .search-input-wrapper {
            position: relative;
            margin-bottom: 1.2rem;
        }
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            font-size: 1rem;
            border: none;
            background: rgba(255,255,255,0.9);
            border-radius: 60px;
            outline: none;
        }
        .search-input:focus {
            box-shadow: 0 0 0 3px #3b82f680;
        }

        .category-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            opacity: 0.7;
        }
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .cat-btn {
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .cat-btn.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 10px rgba(37,99,235,0.3);
        }
        .cat-btn:hover:not(.active) {
            background: rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }

        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .ad-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .ad-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
        }
        .ad-image {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: #cbd5e1;
        }
        .ad-info {
            padding: 1rem;
        }
        .ad-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
        }
        .ad-price {
            font-weight: 800;
            font-size: 1.4rem;
            color: #16a34a;
            margin: 0.5rem 0;
        }
        .ad-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .ad-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.15s;
            background: rgba(0,0,0,0.05);
        }
        .msg-btn {
            background: #2563eb;
            color: white;
        }
        .dots-btn {
            background: #1e293b;
            color: white;
            font-weight: bold;
            width: 42px;
        }

        .floating-add {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #2563eb;
            color: white;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.2s;
            z-index: 200;
        }
        .floating-add:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1e293b;
            color: #f1f5f9;
            max-width: 500px;
            width: 90%;
            border-radius: 2rem;
            padding: 1.8rem;
        }
        .modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.6rem 0;
            border-radius: 1rem;
            border: none;
            background: #334155;
            color: white;
        }
        .modal-content button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            background: #3b82f6;
            border: none;
            border-radius: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .image-preview-area {
            margin: 10px 0;
            text-align: center;
        }
        .image-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 1rem;
            display: none;
            margin-top: 8px;
        }
        .file-label {
            background: #334155;
            padding: 8px;
            border-radius: 2rem;
            text-align: center;
            cursor: pointer;
            display: inline-block;
            width: 100%;
        }
        .menu-dots {
            position: relative;
        }
        .dots-menu {
            display: none;
            position: absolute;
            bottom: 100%;
            right: 0;
            background: #0f172a;
            border-radius: 1rem;
            padding: 0.5rem;
            min-width: 150px;
            flex-direction: column;
            gap: 0.3rem;
            z-index: 50;
        }
        .dots-menu button {
            background: none;
            border: none;
            padding: 8px;
            text-align: left;
            color: white;
            cursor: pointer;
            border-radius: 0.8rem;
        }
        .dots-menu button:hover {
            background: #334155;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.5);
            border-radius: 2rem;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 640px) {
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="logo">🛍️ Покупка/продажа</h1>
        <button class="back-home" onclick="location.href='index.html'">🏠 На главную</button>
    </div>

    <div class="search-section">
        <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Умный поиск: iphone, кроссовки...">
        </div>
        <div class="category-title">📂 КАТЕГОРИИ</div>
        <div class="category-filter" id="categoryFilter">
            <button data-cat="all" class="cat-btn active">Все</button>
            <button data-cat="Электроника" class="cat-btn">📱 Электроника</button>
            <button data-cat="Одежда" class="cat-btn">👕 Одежда</button>
            <button data-cat="Обувь" class="cat-btn">👟 Обувь</button>
            <button data-cat="Дом и сад" class="cat-btn">🏠 Дом и сад</button>
            <button data-cat="Другое" class="cat-btn">📦 Другое</button>
        </div>
    </div>

    <div id="adsList" class="ads-grid"></div>
</div>

<button class="floating-add" id="addAdBtn">+</button>

<!-- Модалка создания -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <h3>📢 Новое объявление</h3>
        <input type="text" id="adTitle" placeholder="Название товара" required>
        <select id="adCategory">
            <option>Электроника</option><option>Одежда</option><option>Обувь</option>
            <option>Дом и сад</option><option>Другое</option>
        </select>
        <input type="number" id="adPrice" placeholder="Цена в ₽" required>
        <div class="file-label">📸 Загрузить фото</div>
        <input type="file" id="adImageFile" accept="image/*" style="display:none">
        <div class="image-preview-area">
            <img id="imagePreview" class="image-preview" alt="предпросмотр">
        </div>
        <textarea id="adDescription" rows="3" placeholder="Полное описание..."></textarea>
        <button id="saveAdBtn">✅ Опубликовать</button>
        <button onclick="closeModal()" style="background:#ef4444; margin-top:0.5rem;">Отмена</button>
    </div>
</div>

<!-- Модалка деталей -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <img id="detailImage" style="width:100%; border-radius:1rem; margin-bottom:1rem;">
        <h2 id="detailTitle"></h2>
        <p id="detailPrice" style="font-size:1.8rem; font-weight:bold; color:#22c55e;"></p>
        <p id="detailCategory" style="opacity:0.7;"></p>
        <p id="detailDesc" style="margin:1rem 0;"></p>
        <button onclick="closeDetailModal()">Закрыть</button>
    </div>
</div>

<script>
    (function() {
        // ---------- Данные ----------
        let ads = [];
        let isPublishing = false;

        function saveAds() {
            localStorage.setItem('baraholka_ads', JSON.stringify(ads));
        }

        function loadInitialAds() {
            const stored = localStorage.getItem('baraholka_ads');
            if (stored) {
                ads = JSON.parse(stored);
            } else {
                ads = [
                    { id: 1, title: "iPhone 16 Pro", category: "Электроника", price: 120000, imageData: null, imageUrl: "https://images.unsplash.com/photo-1678652196566-7b92f8e4cee1?w=400", description: "Отличное состояние, полный комплект." },
                    { id: 2, title: "Nike Air Max", category: "Обувь", price: 12500, imageData: null, imageUrl: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400", description: "Новые, размер 42, оригинал." },
                    { id: 3, title: "Умная колонка", category: "Электроника", price: 4500, imageData: null, imageUrl: "https://images.unsplash.com/photo-1589003077984-894e133ddfab?w=400", description: "Красная, отличное состояние." }
                ];
                saveAds();
            }
        }

        function getAdImageSrc(ad) {
            if (ad.imageData && ad.imageData.startsWith('data:image')) return ad.imageData;
            if (ad.imageUrl) return ad.imageUrl;
            return 'https://via.placeholder.com/400?text=Нет+фото';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Глобальная переменная для текущего фильтра, чтобы не терять состояние
        let currentFilter = { query: '', category: 'all' };

        function getFilteredAds() {
            const query = currentFilter.query.toLowerCase();
            const activeCat = currentFilter.category;
            return ads.filter(ad => {
                const matchSearch = ad.title.toLowerCase().includes(query);
                const matchCat = (activeCat === 'all') || (ad.category === activeCat);
                return matchSearch && matchCat;
            });
        }

        function renderAds() {
            const container = document.getElementById('adsList');
            const filtered = getFilteredAds();
            if (!filtered.length) {
                container.innerHTML = `<div class="empty-state">📭 Пока нет объявлений. Нажмите + чтобы создать первое</div>`;
                return;
            }
            container.innerHTML = filtered.map(ad => {
                const imgSrc = getAdImageSrc(ad);
                return `
                    <div class="ad-card" data-id="${ad.id}">
                        <img class="ad-image" src="${imgSrc}" alt="${ad.title}" onerror="this.src='https://via.placeholder.com/400?text=Ошибка'">
                        <div class="ad-info">
                            <div class="ad-title">${escapeHtml(ad.title)}</div>
                            <div class="ad-category" style="font-size:0.7rem; opacity:0.7;">${ad.category}</div>
                            <div class="ad-price">${Number(ad.price).toLocaleString()} ₽</div>
                            <div class="ad-buttons">
                                <button class="ad-btn msg-btn" data-id="${ad.id}">💬 Написать</button>
                                <div class="menu-dots">
                                    <button class="ad-btn dots-btn" data-id="${ad.id}">⋮</button>
                                    <div class="dots-menu" id="menu-${ad.id}">
                                        <button data-action="complaint" data-id="${ad.id}">⚠️ Пожаловаться</button>
                                        <button data-action="favorite" data-id="${ad.id}">❤️ В избранное</button>
                                        <button data-action="rate" data-id="${ad.id}">⭐ Оценить продавца</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            attachCardEvents();
        }

        function attachCardEvents() {
            // Открытие деталей
            document.querySelectorAll('.ad-card').forEach(card => {
                // Удаляем старый обработчик, чтобы не дублировать
                const oldHandler = card._clickHandler;
                if (oldHandler) card.removeEventListener('click', oldHandler);
                const handler = (e) => {
                    if (e.target.closest('.ad-btn')) return;
                    const id = parseInt(card.dataset.id);
                    showDetail(id);
                };
                card.addEventListener('click', handler);
                card._clickHandler = handler;
            });
            // Кнопки "Написать"
            document.querySelectorAll('.msg-btn').forEach(btn => {
                const oldMsg = btn._msgHandler;
                if (oldMsg) btn.removeEventListener('click', oldMsg);
                const msgHandler = (e) => {
                    e.stopPropagation();
                    alert('💬 Чат с продавцом будет доступен позже.');
                };
                btn.addEventListener('click', msgHandler);
                btn._msgHandler = msgHandler;
            });
            // Кнопки с тремя точками (открыть меню)
            document.querySelectorAll('.dots-btn').forEach(btn => {
                const oldDot = btn._dotHandler;
                if (oldDot) btn.removeEventListener('click', oldDot);
                const dotHandler = (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const menu = document.getElementById(`menu-${id}`);
                    if (!menu) return;
                    // Закрываем все другие меню
                    document.querySelectorAll('.dots-menu').forEach(m => {
                        if (m !== menu) m.style.display = 'none';
                    });
                    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
                };
                btn.addEventListener('click', dotHandler);
                btn._dotHandler = dotHandler;
            });
            // Действия внутри меню
            document.querySelectorAll('[data-action="complaint"]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); alert('⚠️ Жалоба отправлена модератору.'); };
            });
            document.querySelectorAll('[data-action="favorite"]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); alert('❤️ Добавлено в избранное.'); };
            });
            document.querySelectorAll('[data-action="rate"]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); alert('⭐ Оценка продавца уйдёт на модерацию.'); };
            });
        }

        function showDetail(id) {
            const ad = ads.find(a => a.id == id);
            if (!ad) return;
            const detailModal = document.getElementById('detailModal');
            document.getElementById('detailImage').src = getAdImageSrc(ad);
            document.getElementById('detailTitle').innerText = ad.title;
            document.getElementById('detailPrice').innerHTML = `${Number(ad.price).toLocaleString()} ₽`;
            document.getElementById('detailCategory').innerHTML = `📂 ${ad.category}`;
            document.getElementById('detailDesc').innerHTML = ad.description || 'Описание отсутствует.';
            detailModal.style.display = 'flex';
        }

        function closeDetailModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        // Закрытие меню при клике вне области карточек
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.menu-dots')) {
                document.querySelectorAll('.dots-menu').forEach(m => m.style.display = 'none');
            }
        });

        // ---------- Фильтрация и поиск ----------
        const searchInput = document.getElementById('searchInput');
        const categoryButtons = document.querySelectorAll('.cat-btn');

        function updateFilterAndRender() {
            currentFilter.query = searchInput.value;
            renderAds();
        }

        searchInput.addEventListener('input', updateFilterAndRender);
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                categoryButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter.category = this.getAttribute('data-cat');
                renderAds();
            });
        });

        // ---------- Создание объявления (без блокировки) ----------
        let selectedImageBase64 = null;

        document.getElementById('addAdBtn').onclick = () => {
            selectedImageBase64 = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('adImageFile').value = '';
            document.getElementById('adTitle').value = '';
            document.getElementById('adPrice').value = '';
            document.getElementById('adDescription').value = '';
            document.getElementById('createModal').style.display = 'flex';
        };

        document.querySelector('.file-label').onclick = () => {
            document.getElementById('adImageFile').click();
        };
        document.getElementById('adImageFile').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    selectedImageBase64 = ev.target.result;
                    const preview = document.getElementById('imagePreview');
                    preview.src = selectedImageBase64;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        function closeModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        async function createAdAsync() {
            if (isPublishing) return;
            const title = document.getElementById('adTitle').value.trim();
            const category = document.getElementById('adCategory').value;
            const price = parseFloat(document.getElementById('adPrice').value);
            const description = document.getElementById('adDescription').value.trim();

            if (!title || isNaN(price) || price <= 0) {
                alert('Укажите название и корректную цену');
                return;
            }
            if (!selectedImageBase64) {
                alert('Пожалуйста, загрузите фото товара (обязательно)');
                return;
            }

            isPublishing = true;
            const saveBtn = document.getElementById('saveAdBtn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = 'Публикация...';
            saveBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 10));

            const newAd = {
                id: Date.now(),
                title: title,
                category: category,
                price: price,
                imageData: selectedImageBase64,
                imageUrl: null,
                description: description || 'Без описания'
            };
            ads.unshift(newAd);
            saveAds();

            // Обновить фильтр (чтобы новое объявление появилось)
            renderAds();

            closeModal();
            alert('✅ Объявление опубликовано!');
            saveBtn.innerText = originalText;
            saveBtn.disabled = false;
            isPublishing = false;
        }

        const saveAdBtn = document.getElementById('saveAdBtn');
        saveAdBtn.onclick = (e) => {
            e.preventDefault();
            createAdAsync();
        };

        // Инициализация
        loadInitialAds();
        renderAds();

        window.closeDetailModal = closeDetailModal;
        window.closeModal = closeModal;
    })();
</script>
</body>
</html>
